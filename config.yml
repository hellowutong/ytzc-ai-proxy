# TW AI 节能器配置文件
# 版本: v1.0
# 日期: 2026-02-02

# ============================================
# 应用配置
# ============================================
app:
  host: "0.0.0.0"           # 监听地址
  port: 8080                # 监听端口
  data_path: "./data"       # 数据目录
  session_timeout: 1800     # 会话超时（秒）
  model_timeout: 30000      # 模型调用超时（毫秒）

# ============================================
# MongoDB 配置（空密码）
# ============================================
mongodb:
  host: "localhost"
  port: 27017
  username: ""              # 空密码
  password: ""              # 空密码
  database: "ytzc_ai_proxy"
  auth_source: "admin"

# ============================================
# Qdrant 配置
# ============================================
qdrant:
  host: "localhost"
  port: 6333
  api_key: null
  https: false

# ============================================
# 调度策略
# ============================================
strategy:
  fail_threshold: 3         # 连续失败次数阈值
  small_model_retry: 0      # 小模型重试次数

# ============================================
# 供应商配置
# ============================================
providers: []

# ============================================
# 主题配置
# ============================================
theme:
  light:
    primary: "#409EFF"
    bg: "#F5F7FA"
    card: "#FFFFFF"
    text: "#303133"
  dark:
    primary: "#409EFF"
    bg: "#141414"
    card: "#1D1D1D"
    text: "#E5EAF3"

# ============================================
# 日志配置
# ============================================
logging:
  level: "INFO"
