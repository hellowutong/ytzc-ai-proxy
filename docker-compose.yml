# ============== Docker Compose 配置 ==============
# TW AI 节能器 - 一键部署配置
# 
# 使用方法:
#   开发模式: docker-compose up -d
#   生产模式: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   停止: docker-compose down
#   查看日志: docker-compose logs -f

x-common-environment: &common-environment
  TZ: Asia/Shanghai

x-common-healthcheck: &common-healthcheck
  interval: 10s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  # ============== MongoDB 数据库 ==============
  mongodb:
    image: mongo:7
    container_name: ytzc-mongodb
    hostname: mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      <<: *common-environment
      MONGO_INITDB_DATABASE: ytzc_ai_proxy
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-password123}
    command:
      - --replSet rs0
      - --bind_ip 0.0.0.0
      - --wiredTigerCacheSizeGB 1
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
    networks:
      - ytzc-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # ============== Qdrant 向量数据库 ==============
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: ytzc-qdrant
    hostname: qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      <<: *common-environment
      QDRANT__SERVICE__API_TOKEN: ${QDRANT_API_TOKEN:-}
      QDRANT__SERVICE__HTTPS_API_KEY: ${QDRANT_HTTPS_KEY:-}
      QDRANT__STORAGE__PERFORMANCE_UPDATE_RATE: 20
      QDRANT__STORAGE__MAX_OPTIMAL_BLOCK_SIZE: 10485760
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/health"]
    networks:
      - ytzc-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped

  # ============== Proxy API 服务 ==============
  proxy-api:
    build:
      context: ./proxy-api
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    image: ytzc-ai-proxy:${VERSION:-latest}
    container_name: ytzc-proxy-api
    hostname: proxy-api
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./data:/app/data
      - ./baseskill:/app/baseskill
      - proxy_api_logs:/app/logs
    environment:
      <<: *common-environment
      # MongoDB 配置
      MONGODB_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-password123}@mongodb:27017
      MONGODB_DATABASE: ytzc_ai_proxy
      # Qdrant 配置
      QDRANT_URL: http://qdrant:6333
      # 日志配置
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Python 环境
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
    networks:
      - ytzc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: unless-stopped
    restart: unless-stopped

  # ============== Web UI 前端 ==============
  web-ui:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    image: ytzc-web-ui:${VERSION:-latest}
    container_name: ytzc-web-ui
    hostname: web-ui
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web-ui:/app
      - /app/node_modules
    environment:
      <<: *common-environment
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - proxy-api
    networks:
      - ytzc-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ============== Nginx 反向代理 (生产环境) ==============
  nginx:
    image: nginx:alpine
    container_name: ytzc-nginx
    hostname: nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - webui_dist:/usr/share/nginx/html:ro
    depends_on:
      - proxy-api
      - web-ui
    networks:
      - ytzc-network
    healthcheck:
      <<: *common-healthcheck
      test: ["CMD", "nginx", "-t"]
    restart: unless-stopped

# ============== 网络配置 ==============
networks:
  ytzc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============== 数据卷配置 ==============
volumes:
  mongodb_data:
    driver: local
  qdrant_data:
    driver: local
  proxy_api_logs:
    driver: local
  webui_dist:
    driver: local

# ============== 清理命令 ==============
# 在文件末尾添加说明（不作为YAML解析）
