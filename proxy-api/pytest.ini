[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=55
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    mongodb: marks tests that require MongoDB
    qdrant: marks tests that require Qdrant
    database: marks tests that require database services
    requires_service: marks tests that require running services

[tool:pytest]
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

[coverage:run]
source = app
branch = True
parallel = True
omit = 
    tests/*
    __pycache__/*
    *.__pycache__*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
    @abstractmethod
    if __name__ == "__main__":
    if __name__ == '__main__':
